<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Gaveskyen</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
    <h2>🎁 Gaveskyen</h2>
    <button onclick="logout()">Log ud</button>
</nav>

<div class="container">

    <h1>Min ønskeliste</h1>

    <div class="form">
        <input id="title" placeholder="Ønske navn">
        <input id="price" placeholder="Pris">
        <input id="link" placeholder="Link">
        <select id="priority">
            <option value="low">Lav</option>
            <option value="medium">Mellem</option>
            <option value="high">Høj</option>
        </select>
        <button onclick="addWish()">Tilføj</button>
    </div>

    <div id="wishlist" class="grid"></div>

</div>

<script src="/app.js"></script>
<script src="/ui.js"></script>
</body>
</html>
